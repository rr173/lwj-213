<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络拓扑编辑器与流量路由模拟器</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <div class="left-panel">
            <h3>设备面板</h3>
            <div class="device-tools">
                <div class="device-item" draggable="true" data-type="router">
                    <div class="device-icon router-icon"></div>
                    <span>路由器</span>
                </div>
                <div class="device-item" draggable="true" data-type="switch">
                    <div class="device-icon switch-icon"></div>
                    <span>交换机</span>
                </div>
                <div class="device-item" draggable="true" data-type="host">
                    <div class="device-icon host-icon"></div>
                    <span>终端主机</span>
                </div>
            </div>
            
            <h3>流量注入</h3>
            <div class="traffic-panel">
                <div class="form-group">
                    <label>源设备</label>
                    <select id="srcDevice"></select>
                </div>
                <div class="form-group">
                    <label>目的设备</label>
                    <select id="dstDevice"></select>
                </div>
                <div class="form-group">
                    <label>数据量 (KB)</label>
                    <input type="number" id="dataSize" value="1000" min="1">
                </div>
                <div class="form-group">
                    <label>发送速率 (Mbps)</label>
                    <input type="number" id="sendRate" value="10" min="1">
                </div>
                <button id="injectBtn" class="btn btn-primary">注入流量</button>
                <div class="active-traffic">
                    <h4>活跃流量 (<span id="trafficCount">0</span>/10)</h4>
                    <div id="trafficList"></div>
                </div>
            </div>

            <h3>压测场景编排</h3>
            <div class="scenario-panel">
                <div class="scenario-header">
                    <div class="form-group">
                        <label>场景名称</label>
                        <input type="text" id="scenarioName" placeholder="输入场景名称">
                    </div>
                    <div class="scenario-actions">
                        <button id="createScenarioBtn" class="btn btn-small btn-primary">新建场景</button>
                    </div>
                </div>
                <div class="scenario-list" id="scenarioList"></div>
                <div class="scenario-editor" id="scenarioEditor" style="display:none;">
                    <div class="scenario-editor-header">
                        <span id="editingScenarioName"></span>
                        <button id="closeScenarioEditor" class="btn-small">×</button>
                    </div>
                    <div class="event-form">
                        <div class="form-group">
                            <label>触发时刻(秒)</label>
                            <input type="number" id="eventTime" value="0" min="0" step="0.1">
                        </div>
                        <div class="form-group">
                            <label>源设备</label>
                            <select id="eventSrc"></select>
                        </div>
                        <div class="form-group">
                            <label>目的设备</label>
                            <select id="eventDst"></select>
                        </div>
                        <div class="form-group">
                            <label>数据量(KB)</label>
                            <input type="number" id="eventDataSize" value="1000" min="1">
                        </div>
                        <div class="form-group">
                            <label>速率(Mbps)</label>
                            <input type="number" id="eventRate" value="10" min="1">
                        </div>
                        <button id="addEventBtn" class="btn btn-small btn-primary">添加事件</button>
                    </div>
                    <div class="event-list-title">事件列表（按触发时刻排序）</div>
                    <div class="event-list" id="eventList"></div>
                    <div class="scenario-run-actions">
                        <button id="runScenarioBtn" class="btn btn-primary">开始压测</button>
                        <button id="stopScenarioBtn" class="btn" style="display:none;">中止</button>
                        <button id="deleteScenarioBtn" class="btn">删除场景</button>
                    </div>
                    <div class="scenario-progress" id="scenarioProgress" style="display:none;">
                        <div class="progress">
                            <div class="progress-bar" id="scenarioProgressBar"></div>
                        </div>
                        <div class="scenario-progress-text">
                            <span id="scenarioProgressText">0/0 事件</span>
                            <span id="scenarioElapsed">0.0s</span>
                        </div>
                    </div>
                </div>
            </div>

            <h3>拓扑存档</h3>
            <div class="topology-archive-panel">
                <div class="form-group">
                    <label>版本名称</label>
                    <input type="text" id="topoVersionName" placeholder="可选，留空自动命名">
                </div>
                <div class="io-panel">
                    <button id="saveTopoBtn" class="btn btn-primary">保存拓扑</button>
                    <button id="refreshVersionsBtn" class="btn">刷新</button>
                </div>
                <div class="form-group" style="margin-top: 10px;">
                    <label>历史版本</label>
                    <select id="topoVersionSelect">
                        <option value="">选择版本加载</option>
                    </select>
                </div>
                <div class="version-info" id="versionInfo" style="display:none;">
                    <div class="version-meta" id="versionMeta"></div>
                    <button id="loadVersionBtn" class="btn btn-small">加载此版本</button>
                </div>
            </div>

            <h3>导入导出</h3>
            <div class="io-panel">
                <button id="exportBtn" class="btn">导出JSON</button>
                <button id="importBtn" class="btn">导入JSON</button>
                <input type="file" id="importFile" accept=".json" style="display: none;">
            </div>
        </div>

        <div class="canvas-container">
            <div class="toolbar">
                <button id="zoomIn" class="btn-small">+</button>
                <button id="zoomOut" class="btn-small">-</button>
                <span id="zoomLevel">100%</span>
                <button id="resetView" class="btn-small">重置视图</button>
                <span class="divider"></span>
                <span id="deviceCount">设备: 0/50</span>
            </div>
            <canvas id="topologyCanvas"></canvas>
            <div id="logPanel" class="log-panel">
                <h4>传输日志</h4>
                <div id="logContent"></div>
            </div>
        </div>

        <div class="right-panel">
            <h3>属性面板</h3>
            <div id="propertyPanel" class="property-panel">
                <p class="hint">请选择设备或链路查看属性</p>
            </div>

            <h3>路由表</h3>
            <div class="routing-panel">
                <div class="form-group">
                    <label>查看设备</label>
                    <select id="routingDevice"></select>
                </div>
                <div id="routingTable" class="routing-table"></div>
            </div>

            <h3>手动路由</h3>
            <div class="manual-route-panel">
                <div class="form-group">
                    <label>源</label>
                    <select id="manualSrc"></select>
                </div>
                <div class="form-group">
                    <label>目的</label>
                    <select id="manualDst"></select>
                </div>
                <div class="form-group">
                    <label>下一跳</label>
                    <select id="manualNextHop"></select>
                </div>
                <button id="addManualRoute" class="btn btn-small">添加手动路由</button>
                <div id="manualRouteList" class="manual-route-list"></div>
            </div>

            <h3>故障统计</h3>
            <div class="fault-stats-panel">
                <div class="fault-stat-row">
                    <span class="fault-stat-label">当前禁用链路</span>
                    <span class="fault-stat-value" id="disabledLinkCount">0</span>
                </div>
                <div class="fault-stat-row">
                    <span class="fault-stat-label">历史故障次数</span>
                    <span class="fault-stat-value" id="totalFaultCount">0</span>
                </div>
                <div class="fault-stat-row">
                    <span class="fault-stat-label">路径切换次数</span>
                    <span class="fault-stat-value" id="pathSwitchCount">0</span>
                </div>
                <div class="fault-stat-row">
                    <span class="fault-stat-label">流量暂停次数</span>
                    <span class="fault-stat-value" id="pausedFlowCount">0</span>
                </div>
                <div class="fault-actions">
                    <button id="batchFaultBtn" class="btn btn-small">批量模式</button>
                    <button id="restoreAllBtn" class="btn btn-small btn-success">全部恢复</button>
                </div>
                <div id="batchFaultHint" class="batch-hint" style="display:none;">
                    批量模式：点击链路切换状态，完成后点击"应用"
                </div>
            </div>

            <h3>压测报告</h3>
            <div class="report-panel">
                <div class="report-tabs">
                    <button class="report-tab active" data-tab="current">当前报告</button>
                    <button class="report-tab" data-tab="history">历史报告</button>
                    <button class="report-tab" data-tab="compare">对比分析</button>
                </div>

                <div class="report-tab-content" id="tab-current">
                    <div class="report-empty" id="reportEmpty">暂无报告，运行压测场景后自动生成</div>
                    <div class="report-container" id="reportContainer" style="display:none;">
                        <div class="report-header">
                            <div class="report-title">
                                <span id="reportScenarioName"></span>
                                <button id="toggleReportBtn" class="btn-small">收起</button>
                            </div>
                            <button id="exportReportBtn" class="btn btn-small">导出报告</button>
                        </div>
                        <div class="report-content" id="reportContent">
                            <div class="report-section">
                                <h4>总览</h4>
                                <div class="report-stats" id="reportOverview"></div>
                            </div>
                            <div class="report-section">
                                <h4>链路热力排名</h4>
                                <div class="report-links" id="reportLinks"></div>
                            </div>
                            <div class="report-section">
                                <h4>流量明细</h4>
                                <div class="report-flows" id="reportFlows"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="report-tab-content" id="tab-history" style="display:none;">
                    <div class="history-header">
                        <button id="refreshHistoryBtn" class="btn btn-small">刷新列表</button>
                    </div>
                    <div class="history-list" id="historyList">
                        <p class="hint" style="font-size:12px;color:#999;text-align:center;padding:15px;">加载中...</p>
                    </div>
                </div>

                <div class="report-tab-content" id="tab-compare" style="display:none;">
                    <div class="compare-selectors">
                        <div class="form-group">
                            <label>报告 A</label>
                            <select id="compareReport1">
                                <option value="">选择报告</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>报告 B</label>
                            <select id="compareReport2">
                                <option value="">选择报告</option>
                            </select>
                        </div>
                        <button id="doCompareBtn" class="btn btn-primary">开始对比</button>
                    </div>
                    <div class="compare-results" id="compareResults" style="display:none;">
                        <div class="compare-overview">
                            <h4>对比总览</h4>
                            <div class="report-stats" id="compareOverviewStats"></div>
                        </div>
                        <div class="compare-links-section">
                            <h4>链路对比</h4>
                            <div class="compare-links-table" id="compareLinksTable"></div>
                        </div>
                    </div>
                    <div class="compare-empty" id="compareEmpty" style="display:none;">
                        <p class="hint" style="font-size:12px;color:#999;text-align:center;padding:15px;">
                            选择两份报告进行对比
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="linkConfigModal" class="modal">
        <div class="modal-content">
            <h3>链路配置</h3>
            <div class="form-group">
                <label>带宽 (Mbps)</label>
                <input type="number" id="linkBandwidth" value="100" min="1" max="10000">
            </div>
            <div class="form-group">
                <label>延迟 (ms)</label>
                <input type="number" id="linkDelay" value="10" min="1" max="500">
            </div>
            <div class="modal-buttons">
                <button id="cancelLinkConfig" class="btn">取消</button>
                <button id="confirmLinkConfig" class="btn btn-primary">确定</button>
            </div>
        </div>
    </div>

    <div id="contextMenu" class="context-menu">
        <div class="menu-item" data-action="delete">删除</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
